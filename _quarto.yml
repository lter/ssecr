project:
  type: website
  execute-dir: project
  output-dir: docs
  render:
    - "*.qmd"

execute: 
  freeze: auto

website:
  title: "Synthesis Skills for Early Career Researchers"
  repo-url: https://github.com/lter/ssecr
  repo-actions: [issue] 
  favicon: topics/images/logo_lter.png
  google-analytics: "G-YGFW2JT4EY"
  sidebar: 
    title: "Modules"
    style: "docked"
    background: "light"
    border: true
    alignment: left
    collapse-level: 2
    contents:
      - text: "Course Overview"
        href: index.qmd
      - text: "DELETE ME"
        href: 2024_learning-objectives.qmd
      - section: "Course Content"
        contents: 
            - text: "Synthesis Team Fundamentals"
              href: module-01.qmd
            - text: "Project Documentation and Organization"
              href: module-02.qmd
            - text: "Module 3"
              href: module-03.qmd
            - text: "Module 4"
              href: module-04.qmd
            - text: "Module 5"
              href: module-05.qmd
            - text: "Module 6"
              href: module-06.qmd
            - text: "Module 7"
              href: module-07.qmd
            - text: "Module 8"
              href: module-08.qmd
            - text: "Module 9"
              href: module-09.qmd
            - text: "Module 10"
              href: module-10.qmd
            - text: "Module 11"
              href: module-11.qmd
            - text: "Module 12"
              href: module-12.qmd
            - text: "Module 13"
              href: module-13.qmd
            - text: "Module 14"
              href: module-14.qmd
      - text: "Additional Resources"
        href: resources.qmd
  navbar:
    background: primary
    right: 
      - text: "Past Versions"
        menu:
            - text: "2024 (v1.0)"
              href: https://lter.github.io/ssecr-2024/
      - text: "Projects"
        href: projects.qmd 
      - text: "People"
        menu: 
            - text: "Instructors"
              href: instructors.qmd
            - text: "Fellows"
              href: fellows.qmd
      - icon: github
        href: https://github.com/lter/ssecr
  page-footer: 
    center: "Copyright 2026, LTER Network"
    background: secondary
  margin-footer: |
    ![NCEAS Logo](topics/images/logo_nceas.png){ width=40% }
    ![LTER Logo](topics/images/logo_lter.png){ width=34% }

format:
  html:
    code-overflow: scroll
    code-line-numbers: false
    code-copy: hover
    code-annotations: hover
    theme:
       light: _extensions/lter/lter_scss-theme/theme_lter-edu-light.scss
       dark: _extensions/lter/lter_scss-theme/theme_lter-edu-dark.scss
    mainfont: Open Sans
    toc: true
    link-external-newwindow: true
    link-external-icon: false

editor: source
